<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国防教育知识刷题</title>
<style>
:root {
  --primary: #4f46e5;
  --primary-light: #6366f1;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --bg: #f8fafc;
  --card-bg: #ffffff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
  --radius: 12px;
  --transition: 0.2s cubic-bezier(.4,0,.2,1);
}

[data-theme="dark"] {
  --bg: #0f172a;
  --card-bg: #1e293b;
  --text: #f1f5f9;
  --text-secondary: #94a3b8;
  --border: #334155;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* Header */
.header {
  text-align: center;
  padding: 32px 0 20px;
}

.header h1 {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}

.header .subtitle {
  color: var(--text-secondary);
  font-size: 14px;
}

/* Stats Bar */
.stats-bar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 20px;
  text-align: center;
  box-shadow: var(--shadow);
  min-width: 80px;
}

.stat-card .stat-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
}

.stat-card .stat-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.stat-card.correct .stat-value { color: var(--success); }
.stat-card.wrong .stat-value { color: var(--danger); }
.stat-card.total .stat-value { color: var(--text); }
.stat-card.timer .stat-value { color: #f59e0b; font-variant-numeric: tabular-nums; font-family: "SF Mono", "Consolas", "Courier New", monospace; font-size: 20px; }

/* Controls */
.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 24px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

.btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.btn.primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.btn.primary:hover {
  background: var(--primary-light);
}

.btn svg {
  width: 16px;
  height: 16px;
}

/* Progress */
.progress-container {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

.progress-bar {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #8b5cf6);
  border-radius: 4px;
  transition: width 0.4s ease;
}

.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text-secondary);
}

/* Question Card */
.question-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  transition: var(--transition);
  position: relative;
}

.question-card.answered-correct {
  border-color: var(--success);
  background: linear-gradient(135deg, rgba(16,185,129,.05), var(--card-bg));
}

.question-card.answered-wrong {
  border-color: var(--danger);
  background: linear-gradient(135deg, rgba(239,68,68,.05), var(--card-bg));
}

.question-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 12px;
}

.question-number.correct-num { background: var(--success); }
.question-number.wrong-num { background: var(--danger); }
.question-number.unanswered { background: var(--text-secondary); }

.question-text {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 16px;
  line-height: 1.7;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--card-bg);
  color: var(--text);
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  font-size: 14px;
  font-family: inherit;
  width: 100%;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--primary);
  background: rgba(79,70,229,.05);
}

.option-btn .option-label {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-secondary);
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
  transition: var(--transition);
}

.option-btn:hover:not(.disabled) .option-label {
  background: var(--primary);
  color: #fff;
}

.option-btn.selected {
  border-color: var(--primary);
  background: rgba(79,70,229,.08);
}

.option-btn.selected .option-label {
  background: var(--primary);
  color: #fff;
}

.option-btn.correct-answer {
  border-color: var(--success) !important;
  background: rgba(16,185,129,.1) !important;
}

.option-btn.correct-answer .option-label {
  background: var(--success) !important;
  color: #fff !important;
}

/* 漏选的正解：绿色虚线边框 */
.option-btn.correct-answer.missed {
  border-style: dashed !important;
  border-width: 2px !important;
  border-color: var(--success) !important;
  background: rgba(16,185,129,.06) !important;
}

.option-btn.correct-answer.missed .option-label {
  background: var(--success) !important;
  color: #fff !important;
  opacity: 0.7;
}

.option-btn.wrong-answer {
  border-color: var(--danger) !important;
  background: rgba(239,68,68,.1) !important;
}

.option-btn.wrong-answer .option-label {
  background: var(--danger) !important;
  color: #fff !important;
}

.option-btn.disabled {
  cursor: default;
  opacity: 0.7;
}

.option-btn.disabled:hover {
  border-color: var(--border);
  background: var(--card-bg);
}

.option-btn.disabled:hover .option-label {
  background: var(--border);
  color: var(--text-secondary);
}

.feedback {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  display: none;
}

.feedback.show { display: block; }
.feedback.correct { background: rgba(16,185,129,.1); color: var(--success); }
.feedback.wrong { background: rgba(239,68,68,.1); color: var(--danger); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.empty-state svg {
  width: 64px;
  height: 64px;
  margin-bottom: 16px;
  opacity: 0.4;
}

.empty-state h3 {
  font-size: 18px;
  margin-bottom: 8px;
  color: var(--text);
}

/* Pagination / Navigation */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 24px;
}

/* Filter tabs */
.filter-tabs {
  display: flex;
  gap: 4px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

.filter-tab {
  flex: 1;
  padding: 8px 12px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: var(--transition);
  font-family: inherit;
}

.filter-tab.active {
  background: var(--primary);
  color: #fff;
}

/* Theme Toggle */
.theme-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
  transition: var(--transition);
  z-index: 100;
}

.theme-toggle:hover {
  transform: scale(1.1);
}

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 22px; }
  .question-text { font-size: 15px; }
  .stats-bar { gap: 6px; }
  .stat-card { padding: 8px 14px; min-width: 60px; }
  .stat-card .stat-value { font-size: 20px; }
}

.confirm-btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 10px 20px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.confirm-btn:hover {
  background: var(--primary-light);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(79,70,229,.3);
}
.confirm-btn:active {
  transform: translateY(0);
}

.confirm-btn.redo-btn {
  background: linear-gradient(135deg, #f59e0b, #d97706);
}
.confirm-btn.redo-btn:hover {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  box-shadow: 0 4px 12px rgba(245,158,11,.3);
}

/* 多选反馈详细标记 */
.feedback .fb-missed {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 2px;
  border-radius: 4px;
  background: rgba(16,185,129,.15);
  color: #059669;
  font-weight: 600;
}
.feedback .fb-extra {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 2px;
  border-radius: 4px;
  background: rgba(239,68,68,.15);
  color: #dc2626;
  font-weight: 600;
  text-decoration: line-through;
}

/* Page Jump Input */
#pageJumpInput::-webkit-inner-spin-button,
#pageJumpInput::-webkit-outer-spin-button { opacity: 1; }
#pageJumpInput:focus { outline: none; border-color: var(--primary) !important; }

/* Wrong Redo Button */
.wrong-redo-btn {
  background: linear-gradient(135deg, #f97316, #ef4444) !important;
  color: #fff !important;
  border-color: transparent !important;
}
.wrong-redo-btn:hover {
  opacity: 0.9;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(239,68,68,.35);
}

/* Multi-select hint */
.multi-hint {
  font-size: 12px;
  color: #f59e0b;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: rgba(245,158,11,.08);
  border-radius: 6px;
  border-left: 3px solid #f59e0b;
}
</style>
</head>

  <div id="questionsContainer">

// ─── State ────────────────────────────────────────────
const PAGE_SIZE = 5;
let currentMode = 'all';
let currentPage = 0;
let userAnswers = {}; // { questionId: 'A' }
let isCorrect = {};   // { questionId: true/false }
let randomOrder = [];
let timerSeconds = 0;
let timerInterval = null;
let timerRunning = false;

// ─── Init ─────────────────────────────────────────────
function init() {
  // 多选题兼容：type==="multi" 转换为 multiSelect + answerLabels
  QUIZ_DATA.forEach(function(q) {
    if (q.type === 'multi') {
      q.multiSelect = true;
      q.answerLabels = q.answerLabel.split('');
    }
  });
  
  document.getElementById('totalCount').textContent = QUIZ_DATA.length;
  
  // 版本检测：题库更新后清除旧数据
  const DATA_VERSION = 3;
  const savedVersion = parseInt(localStorage.getItem('quiz_data_version') || '0');
  if (savedVersion !== DATA_VERSION) {
    localStorage.removeItem('quiz_state');
    localStorage.setItem('quiz_data_version', DATA_VERSION);
  }
  
  // 检测 #redo= 参数（错题重刷新窗口）
  var redoIds = null;
  var hash = window.location.hash;
  if (hash.indexOf('#redo=') === 0) {
    redoIds = hash.replace('#redo=', '').split(',').map(Number);
    window.redoQuestionIds = redoIds;
    currentMode = 'redo';
    // 重刷窗口使用独立的 localStorage key，不干扰主窗口
  }
  
  if (!redoIds) {
    // Load saved state（仅在非重刷模式下）
    try {
      const saved = JSON.parse(localStorage.getItem('quiz_state') || '{}');
      if (saved.answers) userAnswers = saved.answers;
      if (saved.correct) isCorrect = saved.correct;
      if (saved.mode) currentMode = saved.mode;
      if (saved.timerSeconds) timerSeconds = saved.timerSeconds;
      
      // 多选题每次打开都重置为"未做"状态，用户需重新选择并提交
      QUIZ_DATA.forEach(function(q) {
        if (q.multiSelect && (q.id in isCorrect)) {
          delete userAnswers[q.id];
          delete isCorrect[q.id];
        }
      });
    } catch(e) {}
  }
  
  // Load theme
  const theme = localStorage.getItem('quiz_theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);
  
  updateTimerDisplay();
  setMode(currentMode, true);
  updateStats();
  
  // Auto-start timer if there are unanswered questions
  var totalAnsweredInit = 0;
  QUIZ_DATA.forEach(function(q) {
    if (q.multiSelect) {
      if (q.id in isCorrect) totalAnsweredInit++;
    } else {
      if (q.id in userAnswers) totalAnsweredInit++;
    }
  });
  if (totalAnsweredInit < QUIZ_DATA.length && !timerRunning) {
    startTimer();
  }
}

function saveState() {
  var key = (currentMode === 'redo') ? 'quiz_redo_state' : 'quiz_state';
  
  // 多选题不持久化——每次打开都重新做
  var cleanAnswers = {};
  var cleanCorrect = {};
  for (var k in userAnswers) {
    var q = QUIZ_DATA.find(function(x) { return x.id === parseInt(k); });
    if (!q || !q.multiSelect) cleanAnswers[k] = userAnswers[k];
  }
  for (var k in isCorrect) {
    var q2 = QUIZ_DATA.find(function(x) { return x.id === parseInt(k); });
    if (!q2 || !q2.multiSelect) cleanCorrect[k] = isCorrect[k];
  }
  
  var data = {
    answers: cleanAnswers,
    correct: cleanCorrect,
    timerSeconds: timerSeconds,
  };
  if (currentMode !== 'redo') data.mode = currentMode;
  localStorage.setItem(key, JSON.stringify(data));
}

// ─── Timer ────────────────────────────────────────────
function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  timerInterval = setInterval(() => {
    timerSeconds++;
    updateTimerDisplay();
    // Auto-save every 10 seconds
    if (timerSeconds % 10 === 0) saveState();
  }, 1000);
}

function stopTimer() {
  timerRunning = false;
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  saveState();
}

function resetTimer() {
  stopTimer();
  timerSeconds = 0;
  updateTimerDisplay();
  saveState();
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('statTimer').textContent = 
    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

// ─── Mode ─────────────────────────────────────────────
function setMode(mode, skipSave) {
  currentMode = mode;
  currentPage = 0;
  randomOrder = [];
  
  // 重刷模式：显示标题 + 返回按钮
  var controls = document.querySelector('.controls');
  var redoTitle = document.getElementById('redoTitle');
  if (mode === 'redo') {
    if (!redoTitle) {
      redoTitle = document.createElement('div');
      redoTitle.id = 'redoTitle';
      redoTitle.style.cssText = 'display:flex;align-items:center;justify-content:space-between;text-align:center;padding:12px 20px;margin-bottom:16px;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;border-radius:12px;font-size:16px;font-weight:700;';
      document.getElementById('questionsContainer').before(redoTitle);
    }
    var count = window.redoQuestionIds ? window.redoQuestionIds.length : 0;
    redoTitle.style.display = 'flex';
    redoTitle.innerHTML = '<span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>错题重刷 — ' + count + ' 道题</span><button onclick="exitRedoMode()" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">← 返回</button>';
  } else {
    if (redoTitle) redoTitle.style.display = 'none';
  }
  
  document.querySelectorAll('.controls .btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  
  if (mode === 'random') {
    randomOrder = [...Array(QUIZ_DATA.length).keys()]
      .sort(() => Math.random() - 0.5);
    // Reset answers for fresh random round
    userAnswers = {};
    isCorrect = {};
    resetTimer();
    startTimer();
  } else if (mode === 'redo') {
    // 重刷模式：全新开始，不计时
    userAnswers = {};
    isCorrect = {};
    resetTimer();
  } else {
    // Start timer if not already running and there are unanswered questions
    if (!timerRunning) startTimer();
  }
  
  if (!skipSave) saveState();
  
  var redoBtn = document.getElementById('wrongRedoBtn');
  if (redoBtn) {
    redoBtn.style.display = (mode === 'wrong') ? 'flex' : 'none';
  }
  
  renderQuestions();
}

// ─── Get Filtered Questions ───────────────────────────
function redoWrongMode() {
  // 从主存储（quiz_state）获取错题，而非当前内存（当前模式可能已过滤）
  var wrongIds = [];
  try {
    var saved = JSON.parse(localStorage.getItem('quiz_state') || '{}');
    var savedCorrect = saved.correct || {};
    for (var k in savedCorrect) {
      if (savedCorrect[k] === false) wrongIds.push(parseInt(k));
    }
  } catch(e) {
    // fallback：用内存中的 isCorrect
    wrongIds = Object.keys(isCorrect).filter(function(k) { return isCorrect[k] === false; }).map(Number);
  }
  
  if (wrongIds.length === 0) {
    alert('没有错题可以重刷！');
    return;
  }
  
  // 直接在当前窗口切换到重刷模式
  window.redoQuestionIds = wrongIds;
  setMode('redo');
  window.scrollTo(0, 0);
}

function exitRedoMode() {
  // 把重刷中做对的题目更新回主存储的 isCorrect
  try {
    var saved = JSON.parse(localStorage.getItem('quiz_state') || '{}');
    var savedCorrect = saved.correct || {};
    var changed = false;
    for (var k in isCorrect) {
      var qid = parseInt(k);
      if (isCorrect[k] === true && window.redoQuestionIds && window.redoQuestionIds.indexOf(qid) >= 0) {
        savedCorrect[k] = true;
        changed = true;
      }
    }
    if (changed) {
      saved.correct = savedCorrect;
      localStorage.setItem('quiz_state', JSON.stringify(saved));
    }
  } catch(e) {}
  
  // 恢复主模式状态
  try {
    var saved2 = JSON.parse(localStorage.getItem('quiz_state') || '{}');
    if (saved2.answers) userAnswers = saved2.answers;
    if (saved2.correct) isCorrect = saved2.correct;
    if (saved2.mode) currentMode = saved2.mode;
    if (saved2.timerSeconds) timerSeconds = saved2.timerSeconds;
  } catch(e) {}
  
  // 清理重刷数据
  window.redoQuestionIds = null;
  localStorage.removeItem('quiz_redo_state');
  window.location.hash = '';
  
  setMode(currentMode || 'all');
  window.scrollTo(0, 0);
}

function getFilteredQuestions() {
  let filtered = [];
  
  for (let i = 0; i < QUIZ_DATA.length; i++) {
    const q = QUIZ_DATA[i];
    const qid = q.id;
    
    switch(currentMode) {
      case 'all':
        filtered.push({...q, index: i});
        break;
      case 'unanswered':
        if (q.multiSelect ? !(qid in isCorrect) : !(qid in userAnswers)) filtered.push({...q, index: i});
        break;
      case 'wrong':
        if (isCorrect[qid] === false) filtered.push({...q, index: i});
        break;
      case 'redo':
        if (window.redoQuestionIds && window.redoQuestionIds.indexOf(qid) >= 0) filtered.push({...q, index: i});
        break;
      case 'random':
        filtered.push({...q, index: i});
        break;
    }
  }
  
  if (currentMode === 'random' && randomOrder.length > 0) {
    filtered.sort((a, b) => {
      const ai = QUIZ_DATA.indexOf(QUIZ_DATA.find(q => q.id === a.id));
      const bi = QUIZ_DATA.indexOf(QUIZ_DATA.find(q => q.id === b.id));
      return randomOrder.indexOf(ai) - randomOrder.indexOf(bi);
    });
  }
  
  return filtered;
}

// ─── Render ───────────────────────────────────────────
function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  const filtered = getFilteredQuestions();
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
        <h3>${currentMode === 'wrong' || currentMode === 'redo' ? '没有错题，太棒了！' : currentMode === 'unanswered' ? '所有题目已完成！' : '暂无题目'}</h3>
        <p>${currentMode === 'wrong' || currentMode === 'redo' ? '继续保持 💪' : '换个模式看看吧'}</p>
      </div>`;
    document.getElementById('navButtons').style.display = 'none';
    updateProgress(filtered);
    return;
  }
  
  const start = currentPage * PAGE_SIZE;
  const pageQuestions = filtered.slice(start, start + PAGE_SIZE);
  
  container.innerHTML = pageQuestions.map((q, idx) => {
    const qid = q.id;
    const answered = qid in userAnswers;
    const correct = isCorrect[qid];
    const selectedLabel = userAnswers[qid];
    const answerLabel = q.answerLabel;
    
    // 对于多选题，"已答"的标准是已提交（isCorrect 中有记录），而非仅选中
    const multiSubmitted = q.multiSelect && (qid in isCorrect);
    const effectiveAnswered = q.multiSelect ? multiSubmitted : answered;
    const effectiveCorrect = q.multiSelect ? (isCorrect[qid] === true) : correct;
    
    let cardClass = '';
    if (effectiveAnswered && effectiveCorrect) cardClass = 'answered-correct';
    else if (effectiveAnswered && !effectiveCorrect) cardClass = 'answered-wrong';
    
    let numClass = 'unanswered';
    if (effectiveAnswered && effectiveCorrect) numClass = 'correct-num';
    else if (effectiveAnswered && !effectiveCorrect) numClass = 'wrong-num';
    
    const optionsHtml = q.options.map(opt => {
      let optClass = '';
      const isMulti = q.multiSelect;
      const isAnswered = isMulti ? (qid in isCorrect) : answered;
      const isSelected = isMulti ? (userAnswers[qid] || []).includes(opt.label) : (selectedLabel === opt.label);
      
      if (isAnswered) {
        const isCorrectOpt = isMulti 
          ? (q.answerLabels || []).includes(opt.label)
          : (opt.label === answerLabel);
        if (isCorrectOpt && isSelected) {
          optClass = 'correct-answer';          // 正解且选了 → 绿色
        } else if (isCorrectOpt && !isSelected) {
          optClass = 'correct-answer missed';   // 正解但漏选 → 绿色虚线
        } else if (!isCorrectOpt && isSelected) {
          optClass = 'wrong-answer';            // 错误但选了 → 红色
        }
        // 错误选项没选 → 无样式
      } else if (isSelected) {
        optClass = 'selected';
      }
      
      return `
        <button class="option-btn ${optClass} ${isAnswered ? 'disabled' : ''}"
                onclick="${isAnswered ? '' : `selectAnswer(${qid}, '${opt.label}')`}">
          <span class="option-label">${opt.label}</span>
          <span>${opt.text}</span>
        </button>`;
    }).join('');
    
    let feedbackHtml = '';
    if (effectiveAnswered) {
      const fbClass = effectiveCorrect ? 'correct' : 'wrong';
      let fbText;
      if (q.multiSelect) {
        if (effectiveCorrect) {
          fbText = `✅ 回答正确！`;
        } else {
          // 详细分析：选了哪些、漏了哪些、多选了哪些
          var correctLabels = q.answerLabels || [];
          var userSelected = userAnswers[qid] || [];
          var missed = correctLabels.filter(function(l) { return userSelected.indexOf(l) === -1; });
          var extra = userSelected.filter(function(l) { return correctLabels.indexOf(l) === -1; });
          var parts = [];
          if (missed.length > 0) {
            var missedTexts = missed.map(function(l) {
              var o = q.options.find(function(x) { return x.label === l; });
              return '<span class="fb-missed">' + l + '. ' + (o ? o.text : '') + '</span>';
            }).join('、');
            parts.push('漏选：' + missedTexts);
          }
          if (extra.length > 0) {
            var extraTexts = extra.map(function(l) {
              var o = q.options.find(function(x) { return x.label === l; });
              return '<span class="fb-extra">' + l + '. ' + (o ? o.text : '') + '</span>';
            }).join('、');
            parts.push('多选：' + extraTexts);
          }
          fbText = '❌ 回答错误。' + parts.join('；');
        }
      } else {
        fbText = effectiveCorrect 
          ? `✅ 回答正确！`
          : `❌ 回答错误，正确答案是 <strong>${answerLabel}. ${q.options.find(function(o){return o.label===answerLabel;})?.text || ''}</strong>`;
      }
      feedbackHtml = `<div class="feedback ${fbClass} show">${fbText}</div>`;
    }
    
    return `
      <div class="question-card ${cardClass}">
        <div class="question-number ${numClass}">${qid}</div>
        <div class="question-text">${q.question}</div>
        ${q.multiSelect && !(qid in isCorrect) ? '<div class="multi-hint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> 多选题：请选择所有正确答案后点击下方"确认提交"</div>' : ''}
        <div class="options-list">${optionsHtml}</div>
        ${q.multiSelect && !(qid in isCorrect) ? `<button class="confirm-btn" onclick="confirmMultiSelect(${qid})">确认提交</button>` : ''}
        ${q.multiSelect && (qid in isCorrect) ? `<button class="confirm-btn redo-btn" onclick="redoMultiSelect(${qid})">重做此题</button>` : ''}
        ${feedbackHtml}
      </div>`;
  }).join('');

  const navBtns = document.getElementById('navButtons');
  if (totalPages > 1) {
    navBtns.style.display = 'flex';
    document.getElementById('prevBtn').disabled = currentPage === 0;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
    document.getElementById('pageInfo').textContent = `第 ${currentPage + 1}/${totalPages} 页`;
  } else {
    navBtns.style.display = 'none';
  }
  
  updateProgress(filtered);
}

// ─── Multi-Select Confirmation ────────────────────────
function confirmMultiSelect(qid) {
  var q = QUIZ_DATA.find(function(x) { return x.id === qid; });
  if (!q || !q.multiSelect) return;

  var selected = userAnswers[qid] || [];
  if (selected.length === 0) {
    alert('请先选择至少一个选项再提交！');
    return;
  }

  var correctLabels = q.answerLabels.slice().sort().join(',');
  var selectedLabels = selected.slice().sort().join(',');
  var isOk = (correctLabels === selectedLabels);
  isCorrect[qid] = isOk;

  saveState();
  renderQuestions();
  
  // 重刷模式下检查是否全部完成
  if (currentMode === 'redo') {
    var redoIds2 = window.redoQuestionIds || [];
    var allDone = redoIds2.every(function(id) { return id in isCorrect; });
    if (allDone) {
      var redoCorrect2 = redoIds2.filter(function(id) { return isCorrect[id] === true; }).length;
      var msg2 = '📝 错题重刷完成！\n正确：' + redoCorrect2 + '/' + redoIds2.length + '\n正确率：' + Math.round(redoCorrect2/redoIds2.length*100) + '%\n\n点击确定返回正常模式';
      setTimeout(function() { alert(msg2); exitRedoMode(); }, 300);
    }
  }
  
  // 滚动到当前题目，确保用户能看到反馈
  setTimeout(function() {
    var cards = document.querySelectorAll('.question-card.answered-correct, .question-card.answered-wrong');
    if (cards.length > 0) {
      // 找到第一个包含该 qid 的卡片
      for (var i = 0; i < cards.length; i++) {
        var numEl = cards[i].querySelector('.question-number');
        if (numEl && parseInt(numEl.textContent) === qid) {
          cards[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
          break;
        }
      }
    }
  }, 100);
}

function redoMultiSelect(qid) {
  delete isCorrect[qid];
  delete userAnswers[qid];
  saveState();
  renderQuestions();
}

function updateProgress(filtered) {
  if (!filtered) filtered = getFilteredQuestions();
  const total = QUIZ_DATA.length;
  
  // 已答题数：单选题有 userAnswers 就算；多选题有 isCorrect 才算
  var answeredCount = 0;
  QUIZ_DATA.forEach(function(q) {
    if (q.multiSelect) {
      if (q.id in isCorrect) answeredCount++;
    } else {
      if (q.id in userAnswers) answeredCount++;
    }
  });
  
  const correct = Object.values(isCorrect).filter(v => v === true).length;
  const wrong = Object.values(isCorrect).filter(v => v === false).length;
  
  document.getElementById('statAnswered').textContent = answeredCount;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statAccuracy').textContent = answeredCount > 0 ? Math.round(correct / answeredCount * 100) + '%' : '-';
  
  // Overall progress
  const pct = total > 0 ? Math.round(answeredCount / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `进度 ${answeredCount}/${total}`;
  document.getElementById('progressPercent').textContent = pct + '%';
}

// ─── Answer Selection ─────────────────────────────────
function selectAnswer(qid, label) {
  const q = QUIZ_DATA.find(q => q.id === qid);
  if (!q) return;

  if (q.multiSelect) {
    if (!userAnswers[qid]) userAnswers[qid] = [];
    var arr = userAnswers[qid];
    var idx = arr.indexOf(label);
    if (idx >= 0) {
      arr.splice(idx, 1);
    } else {
      arr.push(label);
    }
    saveState();
    renderQuestions();
    return;
  }
  
  userAnswers[qid] = label;
  isCorrect[qid] = (label === q.answerLabel);
  
  saveState();
  
  // Check if all questions are answered in redo mode
  if (currentMode === 'redo') {
    var redoIds = window.redoQuestionIds || [];
    var answeredInRedo = Object.keys(userAnswers).filter(function(k) { return redoIds.indexOf(parseInt(k)) >= 0; });
    if (answeredInRedo.length >= redoIds.length) {
      stopTimer();
      var redoCorrect = Object.keys(isCorrect).filter(function(k) { return isCorrect[k] === true && redoIds.indexOf(parseInt(k)) >= 0; }).length;
      var msg = '📝 错题重刷完成！\n正确：' + redoCorrect + '/' + redoIds.length + '\n正确率：' + Math.round(redoCorrect/redoIds.length*100) + '%\n\n点击确定返回正常模式';
      alert(msg);
      exitRedoMode();
      return;
    }
  }
  
  // Check if all questions are answered in random mode
  if (currentMode === 'random') {
    const totalAnswered = Object.keys(userAnswers).length;
    if (totalAnswered >= QUIZ_DATA.length) {
      // All done! Show summary, then reshuffle
      stopTimer();
      const m = Math.floor(timerSeconds / 60);
      const s = timerSeconds % 60;
      const correct = Object.values(isCorrect).filter(v => v === true).length;
      const timeStr = m > 0 ? `${m}分${s}秒` : `${s}秒`;
      const msg = `🎉 本轮完成！\n正确：${correct}/${QUIZ_DATA.length}\n正确率：${Math.round(correct/QUIZ_DATA.length*100)}%\n用时：${timeStr}\n\n即将开始新一轮随机刷题…`;
      alert(msg);
      
      // Reshuffle and restart
      randomOrder = [...Array(QUIZ_DATA.length).keys()]
        .sort(() => Math.random() - 0.5);
      userAnswers = {};
      isCorrect = {};
      currentPage = 0;
      resetTimer();
      startTimer();
      saveState();
      renderQuestions();
      window.scrollTo(0, 0);
      return;
    }
  }
  
  renderQuestions();
  
  // Auto-advance in random mode
  if (currentMode === 'random') {
    const filtered = getFilteredQuestions();
    const currentIdx = filtered.findIndex(q => q.id === qid);
    if (currentIdx >= 0 && currentIdx % PAGE_SIZE === PAGE_SIZE - 1 && currentPage < Math.ceil(filtered.length / PAGE_SIZE) - 1) {
      setTimeout(() => nextPage(), 600);
    }
  }
}

// ─── Pagination ───────────────────────────────────────
function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    renderQuestions();
    window.scrollTo(0, 0);
  }
}

function nextPage() {
  const filtered = getFilteredQuestions();
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (currentPage < totalPages - 1) {
    currentPage++;
    renderQuestions();
    window.scrollTo(0, 0);
  }
}

function jumpToPage() {
  const input = document.getElementById('pageJumpInput');
  const page = parseInt(input.value);
  const filtered = getFilteredQuestions();
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (isNaN(page) || page < 1 || page > totalPages) {
    alert('请输入有效的页码（1-' + totalPages + '）');
    return;
  }
  currentPage = page - 1;
  renderQuestions();
  window.scrollTo(0, 0);
}

// ─── Theme Toggle ─────────────────────────────────────
document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('quiz_theme', next);
  updateThemeIcon(next);
});

function updateThemeIcon(theme) {
  const icon = document.getElementById('themeIcon');
  if (theme === 'dark') {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
}

// ─── Start ────────────────────────────────────────────
init();
</script>
