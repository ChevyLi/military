<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问验证</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0c1929 0%, #1a3a5c 50%, #0c1929 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 背景粒子动画 */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
    }

    /* 主容器 */
    .lock-container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px 40px;
      width: 420px;
      max-width: 90vw;
      text-align: center;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
    }

    /* 锁图标 */
    .lock-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lock-icon svg {
      width: 36px;
      height: 36px;
      stroke: #60a5fa;
    }

    /* 标题 */
    .lock-title {
      font-size: 22px;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .lock-subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    /* 输入框 */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 48px 14px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
      letter-spacing: 2px;
    }

    .input-group input:focus {
      border-color: #3b82f6;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .input-group input::placeholder {
      color: #64748b;
      letter-spacing: 1px;
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #64748b;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: #94a3b8;
    }

    .toggle-password svg {
      width: 20px;
      height: 20px;
    }

    /* 按钮 */
    .unlock-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .unlock-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }

    .unlock-btn:active {
      transform: translateY(0);
    }

    .unlock-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .unlock-btn .btn-text {
      transition: opacity 0.2s;
    }

    .unlock-btn .btn-spinner {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .unlock-btn.loading .btn-text { opacity: 0; }
    .unlock-btn.loading .btn-spinner { display: block; }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* 错误提示 */
    .error-msg {
      color: #f87171;
      font-size: 13px;
      margin-top: -8px;
      margin-bottom: 16px;
      min-height: 20px;
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(-4px);
    }

    .error-msg.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 底部提示 */
    .lock-footer {
      margin-top: 24px;
      font-size: 12px;
      color: #475569;
      letter-spacing: 0.5px;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .lock-container {
        padding: 36px 24px;
        border-radius: 20px;
      }
      .lock-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- 背景粒子 -->
  <div class="particles" id="particles"></div>

  <!-- 密码锁 -->
  <div class="lock-container">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1"/>
      </svg>
    </div>

    <h1 class="lock-title">需要密码才能访问</h1>
    <p class="lock-subtitle">请输入密码以查看页面内容</p>

    <div class="input-group">
      <input
        type="password"
        id="passwordInput"
        placeholder="请输入密码"
        autocomplete="off"
        maxlength="20"
      />
      <button class="toggle-password" id="toggleBtn" type="button">
        <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <path d="m14.12 14.12a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        <svg id="eyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <p class="error-msg" id="errorMsg"></p>

    <button class="unlock-btn" id="unlockBtn">
      <span class="btn-text">验证进入</span>
      <span class="btn-spinner"></span>
    </button>

    <p class="lock-footer">国防教育知识刷题 · 请向管理员获取密码</p>
  </div>

  <script>
    // ═══════════════════════════════════════
    //  配置区 —— 在这里修改密码
    // ═══════════════════════════════════════
    const CORRECT_PASSWORD = '2506062';   // ← 改成你想要的密码
    const TARGET_PAGE = 'app.html';             // ← 验证通过后跳转的页面（原页面改名）
    // ═══════════════════════════════════════

    // 背景粒子
    (function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 4 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        particle.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    })();

    // DOM
    const passwordInput = document.getElementById('passwordInput');
    const unlockBtn = document.getElementById('unlockBtn');
    const errorMsg = document.getElementById('errorMsg');
    const toggleBtn = document.getElementById('toggleBtn');
    const eyeOff = document.getElementById('eyeOff');
    const eyeOn = document.getElementById('eyeOn');

    // 密码显示/隐藏
    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeOff.style.display = isPassword ? 'none' : 'block';
      eyeOn.style.display = isPassword ? 'block' : 'none';
    });

    // 回车键提交
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') unlockBtn.click();
    });

    // 提交验证
    unlockBtn.addEventListener('click', () => {
      const input = passwordInput.value.trim();

      if (!input) {
        showError('请输入密码');
        passwordInput.focus();
        return;
      }

      // 模拟加载
      unlockBtn.classList.add('loading');
      errorMsg.classList.remove('show');

      setTimeout(() => {
        if (input === CORRECT_PASSWORD) {
          // 密码正确 → 设置 session 标记并跳转
          sessionStorage.setItem('military_authenticated', 'true');
          window.location.href = TARGET_PAGE;
        } else {
          // 密码错误
          unlockBtn.classList.remove('loading');
          showError('密码错误，请重试');
          passwordInput.value = '';
          passwordInput.focus();
          // 抖动效果
          passwordInput.style.animation = 'none';
          passwordInput.offsetHeight;
          passwordInput.style.animation = 'shake 0.4s ease';
        }
      }, 600);
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }

    // 自动聚焦
    passwordInput.focus();
  </script>

  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
  </style>

</body>
</html>
